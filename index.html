<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsinho - 个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e40af;
            --light-blue: #dbeafe;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: linear-gradient(135deg, rgb(68 73 87 / 85%) 0%, rgb(0 0 0 / 85%) 100%);
            color: var(--white);
            padding: 80px 0 60px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: 60px;
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            box-shadow: var(--shadow);
            background: var(--white);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .title {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        main {
            padding-bottom: 60px;
        }

        .section {
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section p {
            color: var(--text-light);
            line-height: 1.8;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tech-tag {
            background: var(--light-blue);
            color: var(--primary-blue);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .timeline {
            position: relative;
            padding-left: 60px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--light-blue);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-date {
            position: absolute;
            left: -60px;
            top: 0;
            width: 40px;
            height: 40px;
            background: var(--primary-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
        }

        .timeline-content h3 {
            color: var(--primary-blue);
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .timeline-content p {
            font-size: 0.9rem;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            color: var(--primary-blue);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .link-btn:hover {
            background: var(--primary-blue);
            color: var(--white);
            transform: translateY(-3px);
        }

        .link-btn i {
            font-size: 1rem;
        }

        footer {
            background: var(--primary-blue);
            color: var(--white);
            text-align: center;
            padding: 25px 0;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .year-display {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .copyright {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .name {
                font-size: 1.8rem;
            }

            .timeline {
                padding-left: 50px;
            }

            .timeline::before {
                left: 15px;
            }

            .timeline-date {
                left: -50px;
                width: 35px;
                height: 35px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p class="copyright">&copy; by Tsinho 2026</p>
            </div>
        </div>
    </footer>
</body>
</html>
